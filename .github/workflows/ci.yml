name: CI

on:
  push:
    branches: [main, master, html]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Verify static site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify static site files
        run: |
          test -f index.html
          test -f logo.png
          test -f data/extras.json
          grep -q './data/extras.json' index.html
